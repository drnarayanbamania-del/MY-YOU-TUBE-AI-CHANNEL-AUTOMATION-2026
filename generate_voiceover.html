<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎙️ Sarvam AI Voiceover Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a1a;
            color: #e0e0e0;
            min-height: 100vh;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 30px 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #667eea, #764ba2, #f093fb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        .header p {
            color: #888;
            font-size: 0.95rem;
        }

        .config-bar {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            background: #111128;
            border: 1px solid #2a2a4a;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 20px;
            align-items: end;
        }

        .config-bar .field {
            flex: 1;
            min-width: 120px;
        }

        .config-bar label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            color: #888;
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .config-bar select, .config-bar input {
            width: 100%;
            padding: 8px 10px;
            background: #0a0a1a;
            border: 1px solid #333;
            border-radius: 8px;
            color: #fff;
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
        }

        .scene-card {
            background: #111128;
            border: 1px solid #2a2a4a;
            border-radius: 14px;
            padding: 18px;
            margin-bottom: 12px;
            transition: all 0.3s ease;
        }

        .scene-card.generating {
            border-color: #667eea;
            box-shadow: 0 0 20px rgba(102, 126, 234, 0.15);
        }

        .scene-card.done {
            border-color: #22c55e;
        }

        .scene-card.error {
            border-color: #ef4444;
        }

        .scene-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .scene-title {
            font-weight: 700;
            font-size: 0.95rem;
        }

        .scene-badge {
            font-size: 0.7rem;
            padding: 3px 10px;
            border-radius: 20px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .badge-pending { background: #333; color: #888; }
        .badge-generating { background: #667eea33; color: #667eea; animation: pulse 1.5s infinite; }
        .badge-done { background: #22c55e33; color: #22c55e; }
        .badge-error { background: #ef444433; color: #ef4444; }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .scene-text {
            font-size: 0.85rem;
            color: #aaa;
            line-height: 1.5;
            margin-bottom: 8px;
        }

        .scene-audio {
            width: 100%;
            height: 40px;
            border-radius: 8px;
            margin-top: 8px;
        }

        .btn-generate {
            display: block;
            width: 100%;
            padding: 16px;
            font-size: 1.1rem;
            font-weight: 700;
            font-family: 'Inter', sans-serif;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            margin: 24px 0;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-generate:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(102, 126, 234, 0.4); }
        .btn-generate:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: #222;
            border-radius: 3px;
            margin: 16px 0;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2, #f093fb);
            border-radius: 3px;
            transition: width 0.5s ease;
            width: 0%;
        }

        .status-text {
            text-align: center;
            font-size: 0.9rem;
            color: #888;
            margin-bottom: 10px;
        }

        .btn-download {
            display: none;
            width: 100%;
            padding: 16px;
            font-size: 1.1rem;
            font-weight: 700;
            font-family: 'Inter', sans-serif;
            border: 2px solid #22c55e;
            border-radius: 12px;
            cursor: pointer;
            background: #22c55e22;
            color: #22c55e;
            margin: 12px 0;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-download:hover { background: #22c55e; color: #000; }

        .final-audio {
            display: none;
            background: #111128;
            border: 2px solid #22c55e;
            border-radius: 14px;
            padding: 20px;
            margin-top: 20px;
            text-align: center;
        }

        .final-audio h3 {
            color: #22c55e;
            margin-bottom: 12px;
            font-size: 1.1rem;
        }

        .error-msg {
            background: #ef444422;
            border: 1px solid #ef4444;
            border-radius: 8px;
            padding: 12px;
            color: #ef4444;
            font-size: 0.85rem;
            margin-top: 8px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎙️ Sarvam AI Voiceover Generator</h1>
            <p>Bulbul v3 • Hindi TTS • YouTube Video Package</p>
        </div>

        <!-- Config -->
        <div class="config-bar">
            <div class="field" style="flex: 2;">
                <label>API Key</label>
                <input type="password" id="apiKey" value="sk_aqlk3i13_mTuUOROjLOLjah0BZzd5Hs96" placeholder="sk_...">
            </div>
            <div class="field">
                <label>Voice</label>
                <select id="speaker">
                    <option value="shubh" selected>Shubh (Male)</option>
                    <option value="manan">Manan (Male)</option>
                    <option value="aditya">Aditya (Male)</option>
                    <option value="shreya">Shreya (Female)</option>
                    <option value="ishita">Ishita (Female)</option>
                    <option value="ritu">Ritu (Female)</option>
                    <option value="priya">Priya (Female)</option>
                    <option value="rahul">Rahul (Male)</option>
                    <option value="kavya">Kavya (Female)</option>
                </select>
            </div>
            <div class="field">
                <label>Pace</label>
                <select id="pace">
                    <option value="0.9">0.9x Slow</option>
                    <option value="1.0">1.0x Normal</option>
                    <option value="1.05" selected>1.05x Slightly Fast</option>
                    <option value="1.1">1.1x Fast</option>
                    <option value="1.2">1.2x Very Fast</option>
                </select>
            </div>
            <div class="field">
                <label>Model</label>
                <select id="model">
                    <option value="bulbul:v3" selected>Bulbul v3 (Best)</option>
                    <option value="bulbul:v2">Bulbul v2 (Legacy)</option>
                </select>
            </div>
        </div>

        <!-- Progress -->
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
        <div class="status-text" id="statusText">Ready — Click "Generate Voiceover" to start</div>

        <!-- Scenes -->
        <div id="scenesContainer"></div>

        <!-- Generate Button -->
        <button class="btn-generate" id="btnGenerate" onclick="generateAll()">
            🎙️ Generate Voiceover
        </button>

        <!-- Error -->
        <div class="error-msg" id="errorMsg"></div>

        <!-- Final Audio -->
        <div class="final-audio" id="finalAudioSection">
            <h3>✅ Voiceover Generation Complete!</h3>
            <p style="color: #aaa; margin-bottom: 12px;">All 7 scenes merged with cinematic pauses</p>
            <audio controls id="finalAudioPlayer" style="width: 100%; margin-bottom: 12px;"></audio>
            <button class="btn-download" id="btnDownloadFinal" style="display:inline-block;" onclick="downloadFinal()">
                ⬇️ Download Final Voiceover (WAV)
            </button>
        </div>
    </div>

    <script src="niche_config.js"></script>
    <script>
        // ============================================================
        // SCENE DATA
        // ============================================================
        // SCENES are loaded from niche_config.js


        const audioBuffers = [];
        let isGenerating = false;

        // ============================================================
        // RENDER SCENES
        // ============================================================
        function renderScenes() {
            const container = document.getElementById('scenesContainer');
            container.innerHTML = SCENES.map(s => `
                <div class="scene-card" id="scene-${s.id}">
                    <div class="scene-header">
                        <span class="scene-title">Scene ${s.id} — ${s.name} <span style="color:#666; font-weight:400;">(${s.duration})</span></span>
                        <span class="scene-badge badge-pending" id="badge-${s.id}">Pending</span>
                    </div>
                    <div class="scene-text">"${s.text}"</div>
                    <div id="audio-container-${s.id}"></div>
                </div>
            `).join('');
        }

        // ============================================================
        // SARVAM AI TTS API CALL
        // ============================================================
        async function textToSpeech(text) {
            const apiKey = document.getElementById('apiKey').value;
            const speaker = document.getElementById('speaker').value;
            const pace = parseFloat(document.getElementById('pace').value);
            const model = document.getElementById('model').value;

            const body = {
                inputs: [text],
                target_language_code: 'hi-IN',
                model: model,
                speaker: speaker,
                pace: pace,
            };

            // Only add temperature for v3
            if (model === 'bulbul:v3') {
                body.temperature = 0.7;
            }

            const response = await fetch('https://api.sarvam.ai/text-to-speech', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'api-subscription-key': apiKey,
                },
                body: JSON.stringify(body),
            });

            if (!response.ok) {
                const errText = await response.text();
                throw new Error(`API Error ${response.status}: ${errText}`);
            }

            const data = await response.json();
            if (data.audios && data.audios.length > 0) {
                return data.audios[0]; // base64 encoded audio
            }
            throw new Error('No audio data in response');
        }

        // ============================================================
        // BASE64 TO AUDIO BLOB
        // ============================================================
        function base64ToBlob(base64, mimeType = 'audio/wav') {
            const byteChars = atob(base64);
            const byteArrays = [];
            for (let i = 0; i < byteChars.length; i += 512) {
                const slice = byteChars.slice(i, i + 512);
                const byteNumbers = new Array(slice.length);
                for (let j = 0; j < slice.length; j++) {
                    byteNumbers[j] = slice.charCodeAt(j);
                }
                byteArrays.push(new Uint8Array(byteNumbers));
            }
            return new Blob(byteArrays, { type: mimeType });
        }

        function base64ToArrayBuffer(base64) {
            const byteChars = atob(base64);
            const bytes = new Uint8Array(byteChars.length);
            for (let i = 0; i < byteChars.length; i++) {
                bytes[i] = byteChars.charCodeAt(i);
            }
            return bytes.buffer;
        }

        // ============================================================
        // GENERATE ALL SCENES
        // ============================================================
        async function generateAll() {
            if (isGenerating) return;
            isGenerating = true;

            const btn = document.getElementById('btnGenerate');
            btn.disabled = true;
            btn.textContent = '⏳ Generating...';
            document.getElementById('errorMsg').style.display = 'none';
            document.getElementById('finalAudioSection').style.display = 'none';

            audioBuffers.length = 0;
            const total = SCENES.length;
            let completed = 0;

            for (const scene of SCENES) {
                const card = document.getElementById(`scene-${scene.id}`);
                const badge = document.getElementById(`badge-${scene.id}`);

                card.className = 'scene-card generating';
                badge.className = 'scene-badge badge-generating';
                badge.textContent = 'Generating...';
                document.getElementById('statusText').textContent = `Generating Scene ${scene.id}/${total}: ${scene.name}...`;

                try {
                    const audioBase64 = await textToSpeech(scene.text);

                    // Create audio player for this scene
                    const blob = base64ToBlob(audioBase64);
                    const url = URL.createObjectURL(blob);
                    document.getElementById(`audio-container-${scene.id}`).innerHTML = `
                        <audio controls class="scene-audio" src="${url}"></audio>
                    `;

                    // Store for merging
                    audioBuffers.push({ base64: audioBase64, pauseMs: scene.pauseMs });

                    card.className = 'scene-card done';
                    badge.className = 'scene-badge badge-done';
                    badge.textContent = '✅ Done';

                    completed++;
                    const pct = Math.round((completed / total) * 100);
                    document.getElementById('progressFill').style.width = pct + '%';

                    // Delay between requests to avoid rate limiting
                    if (scene.id < total) {
                        await new Promise(r => setTimeout(r, 800));
                    }
                } catch (error) {
                    card.className = 'scene-card error';
                    badge.className = 'scene-badge badge-error';
                    badge.textContent = '❌ Error';
                    document.getElementById(`audio-container-${scene.id}`).innerHTML = `
                        <div style="color:#ef4444; font-size: 0.8rem; margin-top: 6px;">Error: ${error.message}</div>
                    `;

                    // Show error but continue with remaining scenes
                    document.getElementById('errorMsg').style.display = 'block';
                    document.getElementById('errorMsg').textContent = `Scene ${scene.id} error: ${error.message}`;

                    completed++;
                    const pct = Math.round((completed / total) * 100);
                    document.getElementById('progressFill').style.width = pct + '%';

                    await new Promise(r => setTimeout(r, 1000));
                }
            }

            // Show final merged audio section
            if (audioBuffers.length > 0) {
                try {
                    await createMergedAudio();
                } catch(e) {
                    console.error('Merge error:', e);
                }
            }

            document.getElementById('statusText').textContent = `✅ Complete! ${audioBuffers.length}/${total} scenes generated.`;
            btn.textContent = '🔄 Re-Generate Voiceover';
            btn.disabled = false;
            isGenerating = false;
        }

        // ============================================================
        // MERGE AUDIO USING WEB AUDIO API
        // ============================================================
        async function createMergedAudio() {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 24000 });
            const decodedBuffers = [];

            for (const item of audioBuffers) {
                try {
                    const arrayBuf = base64ToArrayBuffer(item.base64);
                    const decoded = await audioCtx.decodeAudioData(arrayBuf);
                    decodedBuffers.push({ buffer: decoded, pauseMs: item.pauseMs });
                } catch(e) {
                    console.warn('Could not decode one scene:', e);
                }
            }

            if (decodedBuffers.length === 0) return;

            // Calculate total length
            let totalFrames = 0;
            for (const d of decodedBuffers) {
                totalFrames += d.buffer.length;
                totalFrames += Math.floor((d.pauseMs / 1000) * audioCtx.sampleRate);
            }

            const merged = audioCtx.createBuffer(1, totalFrames, audioCtx.sampleRate);
            const output = merged.getChannelData(0);
            let offset = 0;

            for (const d of decodedBuffers) {
                const channelData = d.buffer.getChannelData(0);
                output.set(channelData, offset);
                offset += d.buffer.length;
                // Add silence for pause
                const silenceFrames = Math.floor((d.pauseMs / 1000) * audioCtx.sampleRate);
                offset += silenceFrames;
            }

            // Convert to WAV blob
            const wavBlob = audioBufferToWav(merged);
            const url = URL.createObjectURL(wavBlob);

            document.getElementById('finalAudioPlayer').src = url;
            document.getElementById('finalAudioSection').style.display = 'block';

            // Store for download
            window._finalWavBlob = wavBlob;

            audioCtx.close();
        }

        // ============================================================
        // AUDIO BUFFER TO WAV CONVERSION
        // ============================================================
        function audioBufferToWav(buffer) {
            const numChannels = 1;
            const sampleRate = buffer.sampleRate;
            const format = 1; // PCM
            const bitDepth = 16;
            const data = buffer.getChannelData(0);
            const dataLength = data.length * (bitDepth / 8);
            const headerLength = 44;
            const totalLength = headerLength + dataLength;
            const arrayBuffer = new ArrayBuffer(totalLength);
            const view = new DataView(arrayBuffer);

            // RIFF header
            writeString(view, 0, 'RIFF');
            view.setUint32(4, 36 + dataLength, true);
            writeString(view, 8, 'WAVE');
            writeString(view, 12, 'fmt ');
            view.setUint32(16, 16, true);
            view.setUint16(20, format, true);
            view.setUint16(22, numChannels, true);
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, sampleRate * numChannels * (bitDepth / 8), true);
            view.setUint16(32, numChannels * (bitDepth / 8), true);
            view.setUint16(34, bitDepth, true);
            writeString(view, 36, 'data');
            view.setUint32(40, dataLength, true);

            // Write PCM samples
            let offset = 44;
            for (let i = 0; i < data.length; i++, offset += 2) {
                const s = Math.max(-1, Math.min(1, data[i]));
                view.setInt16(offset, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
            }

            return new Blob([arrayBuffer], { type: 'audio/wav' });
        }

        function writeString(view, offset, string) {
            for (let i = 0; i < string.length; i++) {
                view.setUint8(offset + i, string.charCodeAt(i));
            }
        }

        // ============================================================
        // DOWNLOAD
        // ============================================================
        function downloadFinal() {
            if (!window._finalWavBlob) return;
            const url = URL.createObjectURL(window._finalWavBlob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'voiceover_final.wav';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        // Init
        renderScenes();
    </script>
</body>
</html>
